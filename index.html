<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personality Quiz</title>
    <link rel="icon" type="image/x-icon" href="/img/ideas.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href ="./css/style.css">
</head>

<body>
  <h1 class="text-center mt-4">What Type of Person Are You?</h1>

<!-- Question 1 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>What’s your ideal weekend?</h4>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="1">Stay home</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="3">Go out</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="2">Hang with friends</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="4">Adventure</button>
  </div>
</div>

<!-- Question 2 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>Pick a favorite activity</h4>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="1">Reading</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="3">Partying</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="2">Gaming</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="4">Traveling</button>
  </div>
</div>

<!-- Question 3 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>How do you handle stress?</h4>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="1">Stay calm</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="3">Talk it out</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="2">Distract myself</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="4">Take action</button>
  </div>
</div>

<!-- Question 4 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>Pick a vibe</h4>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="1">Chill</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="3">Fun</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="2">Creative</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="4">Bold</button>
  </div>
</div>

<!-- Question 5 -->
<div class="container d-flex justify-content-center">
  <div class="card my-4 p-4 question-block" style="width: 75%;">
    <h4>What motivates you most?</h4>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="1">Peace</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="3">People</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="2">Passion</button>
    <button class="btn btn-outline-primary m-1 answer-btn" data-points="4">Success</button>
  </div>
</div>
    
<!-- Button -->
<div class="container text-center">
  <button id="show-result" class="btn btn-success my-4">Show Results</button>
</div>

<!-- Result -->
<div class="container d-flex justify-content-center">
  <div id="result-container" class="card p-4 mb-4" style="width: 75%; display: none;">
    <h3>Your Result:</h3>
    <p id="result-text"></p>
  </div>
</div>

    <!-- Connect to your script file here -->
     <script src = "./js/script.js"></script>
</body>
</html>
